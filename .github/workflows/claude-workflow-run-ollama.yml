name: Claude workflow_run Ollama PoC

on:
  workflow_run:
    workflows: ["PR CI"]
    types: [completed]

jobs:
  claude:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      ANTHROPIC_AUTH_TOKEN: ollama
      ANTHROPIC_BASE_URL: http://localhost:11434
    steps:
      - name: Checkout PR head at workspace root
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 5

      - name: Smoke test MiniMax through Ollama
        run: ollama run minimax-m2.7:cloud "reply OK"

      - name: Run Claude Code Action through Ollama
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ollama
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "Reply with OK only."
          claude_args: "--model minimax-m2.7:cloud --max-turns 1"

      - name: Check marker file
        if: always()
        run: |
          if [ -f claude-startup-marker.txt ]; then
            cat claude-startup-marker.txt
          else
            echo "No Claude startup marker file found"
          fi
